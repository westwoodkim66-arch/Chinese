<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音檔索引</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="flex h-screen">
  <div class="w-72 bg-white shadow overflow-y-auto">
    <div class="p-4 font-bold">課程列表</div>
    <ul id="list" class="p-2 space-y-2"></ul>
  </div>
  <div class="flex-1 flex flex-col">
    <div class="p-4 bg-white border-b" id="title">請選擇課程</div>
    <div class="flex-1 flex flex-col items-center justify-center">
      <audio id="player" controls class="w-3/4"></audio>
      <div class="mt-4">
        <button onclick="prev()">上一課</button>
        <button onclick="next()">下一課</button>
      </div>
    </div>
  </div>
</div>

<script>
const lessons = [{"title": "第1課", "file": "assets/lesson_001.mp3"}, {"title": "第2課", "file": "assets/lesson_002.mp3"}, {"title": "第3課", "file": "assets/lesson_003.mp3"}, {"title": "第4課", "file": "assets/lesson_004.mp3"}, {"title": "第5課", "file": "assets/lesson_005.mp3"}, {"title": "第6課", "file": "assets/lesson_006.mp3"}, {"title": "第7課", "file": "assets/lesson_007.mp3"}, {"title": "第8課", "file": "assets/lesson_008.mp3"}, {"title": "第9課", "file": "assets/lesson_009.mp3"}, {"title": "第10課", "file": "assets/lesson_010.mp3"}, {"title": "第11課", "file": "assets/lesson_011.mp3"}, {"title": "第12課", "file": "assets/lesson_012.mp3"}, {"title": "第13課", "file": "assets/lesson_013.mp3"}, {"title": "第14課", "file": "assets/lesson_014.mp3"}, {"title": "第15課", "file": "assets/lesson_015.mp3"}, {"title": "第16課", "file": "assets/lesson_016.mp3"}, {"title": "第17課", "file": "assets/lesson_017.mp3"}, {"title": "第18課", "file": "assets/lesson_018.mp3"}, {"title": "第19課", "file": "assets/lesson_019.mp3"}, {"title": "第20課", "file": "assets/lesson_020.mp3"}, {"title": "第21課", "file": "assets/lesson_021.mp3"}, {"title": "第22課", "file": "assets/lesson_022.mp3"}, {"title": "第23課", "file": "assets/lesson_023.mp3"}, {"title": "第24課", "file": "assets/lesson_024.mp3"}, {"title": "第25課", "file": "assets/lesson_025.mp3"}, {"title": "第26課", "file": "assets/lesson_026.mp3"}, {"title": "第27課", "file": "assets/lesson_027.mp3"}, {"title": "第28課", "file": "assets/lesson_028.mp3"}, {"title": "第29課", "file": "assets/lesson_029.mp3"}, {"title": "第30課", "file": "assets/lesson_030.mp3"}];
let current = -1;
const listEl = document.getElementById('list');
const player = document.getElementById('player');
const titleEl = document.getElementById('title');

function render() {
  listEl.innerHTML = '';
  lessons.forEach((l, i) => {
    const li = document.createElement('li');
    li.className = "p-2 bg-gray-100 cursor-pointer";
    li.innerText = l.title;
    li.onclick = () => play(i);
    listEl.appendChild(li);
  });
}

function play(i) {
  current = i;
  player.src = lessons[i].file;
  player.play();
  titleEl.innerText = lessons[i].title;
}

function next() {
  if(current < lessons.length-1) play(current+1);
}

function prev() {
  if(current > 0) play(current-1);
}

player.addEventListener('ended', next);

render();
</script>
</body>
</html>
